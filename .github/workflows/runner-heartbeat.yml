name: Runner Heartbeat

on:
  schedule:
    - cron: "0 1 * * 0"    # every Sunday at 1AM UTC
  workflow_dispatch:

permissions:
  actions: write  # Required to upload artifacts
  contents: read  # Required to read repository contents

jobs:
  # Single source of truth: the fleet is defined in .github/runners.json. This
  # job turns that list into a matrix so heartbeat covers exactly the machines
  # we manage -- add/remove a runner by editing runners.json only.
  list-runners:
    name: List runners
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.list.outputs.matrix }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build runner matrix from runners.json
        id: list
        run: |
          python3 .github/scripts/select_runners.py --name "" --os any --group any

  heartbeat:
    needs: list-runners
    strategy:
      fail-fast: false  # Continue even if one runner fails
      matrix:
        include: ${{ fromJson(needs.list-runners.outputs.matrix) }}

    runs-on: [self-hosted, "${{ matrix.runner }}"]
    steps:
      - name: Create heartbeat file (Windows)
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          $timestamp = Get-Date -Format "yyyy-MM-ddTHH:mm:ssK"
          $runner = "${{ runner.name }}"
          "$timestamp" | Out-File -FilePath "heartbeat-$runner.txt" -Encoding utf8

      - name: Create heartbeat file (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          timestamp=$(date -Iseconds)
          runner="${{ runner.name }}"
          echo "$timestamp" > "heartbeat-$runner.txt"

      - name: Upload heartbeat artifact
        uses: actions/upload-artifact@v4
        with:
          name: heartbeat-${{ runner.name }}
          path: heartbeat-${{ runner.name }}.txt
          retention-days: 14